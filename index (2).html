<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>퇴원기록지 도우미 v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #0b0f17;
    --bg2: #0f1623;
    --bg3: #141d30;
    --card: #161f33;
    --card-hover: #1a2540;
    --border: #1e2d4a;
    --border2: #253652;
    --accent: #4d9eff;
    --accent2: #185FA5;
    --accent-soft: rgba(77, 158, 255, 0.12);
    --green: #00d97e;
    --red: #ff4d6a;
    --yellow: #ffc14d;
    --orange: #ff8a3d;
    --text: #e5edff;
    --text2: #8da3c7;
    --text3: #5d7090;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; }
  body { padding: 12px 12px 100px 12px; max-width: 760px; margin: 0 auto; min-height: 100vh; }
  .header { display: flex; align-items: baseline; justify-content: space-between; padding: 8px 4px 14px 4px; }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  .header h1 .ver { color: var(--text3); font-weight: 400; font-size: 11px; font-family: var(--mono); margin-left: 6px; }
  .header .sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .section-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin: 14px 4px 6px 4px; font-weight: 600; }
  .cats { display: flex; gap: 6px; overflow-x: auto; padding: 2px 0 6px 0; scrollbar-width: none; }
  .cats::-webkit-scrollbar { display: none; }
  .cat { flex-shrink: 0; padding: 8px 14px; border-radius: 999px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: var(--sans); white-space: nowrap; }
  .cat:hover { background: var(--card); color: var(--text); }
  .cat.active { background: var(--accent2); color: #fff; border-color: var(--accent2); font-weight: 500; }
  .diseases { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; }
  .disease { padding: 10px 10px; background: var(--card); border: 0.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; text-align: left; }
  .disease:hover { background: var(--card-hover); border-color: var(--border2); }
  .disease.active { background: var(--accent-soft); border-color: var(--accent); }
  .disease .dko { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
  .disease .den { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: -0.02em; }
  .form { margin-top: 16px; }
  .field { margin-bottom: 14px; }
  .field-label { display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; font-weight: 600; padding: 0 4px; gap: 8px; }
  .field-label .hint { font-size: 10px; color: var(--text3); text-transform: none; letter-spacing: 0; font-weight: 400; }
  .field-label .reset-btn { background: transparent; border: 0.5px solid var(--border); color: var(--text3); font-size: 10px; padding: 3px 8px; border-radius: 6px; cursor: pointer; font-family: var(--sans); text-transform: none; letter-spacing: 0; font-weight: 400; }
  .field-label .reset-btn:hover { color: var(--text2); border-color: var(--border2); }
  input[type="text"], textarea { width: 100%; background: var(--bg2); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13.5px; color: var(--text); font-family: var(--sans); resize: vertical; line-height: 1.6; transition: border 0.15s; }
  input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--accent); background: var(--bg3); }
  textarea { min-height: 110px; }
  textarea.narrative { min-height: 130px; line-height: 1.65; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; padding: 2px 0; }
  .chip { padding: 6px 11px; border-radius: 999px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 12px; cursor: pointer; user-select: none; transition: all 0.12s; font-family: var(--sans); line-height: 1.35; }
  .chip:hover { color: var(--text); border-color: var(--border2); }
  .chip.on { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .chip.warn.on { background: rgba(255, 77, 106, 0.12); color: var(--red); border-color: var(--red); }
  .chip.tx.on { background: rgba(255, 193, 77, 0.12); color: var(--yellow); border-color: var(--yellow); }
  .chip.rx.on { background: rgba(0, 217, 126, 0.10); color: var(--green); border-color: var(--green); }
  .chip .x { color: var(--text3); margin-right: 4px; }
  .bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 12px 12px 12px; background: linear-gradient(to top, var(--bg) 70%, transparent); display: flex; gap: 8px; max-width: 760px; margin: 0 auto; z-index: 10; }
  .btn { flex: 1; padding: 14px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--sans); letter-spacing: -0.01em; transition: all 0.15s; }
  .btn-primary { background: var(--accent2); color: #fff; }
  .btn-primary:hover { background: var(--accent); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: var(--card); color: var(--text2); border: 0.5px solid var(--border); flex: 0 0 100px; }
  .btn-secondary:hover { color: var(--text); background: var(--card-hover); }
  .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: var(--green); color: #042918; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0, 217, 126, 0.3); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }
  .empty { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 13px; }
  .empty .e-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.5; }
  .dx-card { background: linear-gradient(135deg, var(--accent-soft), transparent); border: 0.5px solid var(--accent); border-radius: 10px; padding: 14px; margin-bottom: 14px; }
  .dx-card .dx-ko { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; }
  .dx-card .dx-en { font-size: 12px; color: var(--text2); font-family: var(--mono); }
  .dx-card .dx-icd { display: inline-block; font-size: 10px; background: var(--accent-soft); color: var(--accent); padding: 2px 6px; border-radius: 4px; margin-left: 6px; font-family: var(--mono); font-weight: 500; }
  .add-row { display: flex; gap: 6px; margin-top: 6px; }
  .add-row input { flex: 1; font-size: 12px; padding: 6px 10px; }
  .add-row button { background: var(--accent2); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: var(--sans); white-space: nowrap; }
  .preview { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px; font-family: var(--mono); font-size: 11.5px; color: var(--text2); white-space: pre-wrap; line-height: 1.65; max-height: 320px; overflow-y: auto; }
  .warn-note { background: rgba(255, 77, 106, 0.08); border-left: 3px solid var(--red); color: var(--text2); font-size: 11px; padding: 8px 10px; border-radius: 4px; margin-bottom: 6px; line-height: 1.5; }
</style>
</head>
<body>

<div class="header">
  <h1>퇴원기록지 도우미 <span class="ver">v2.0</span></h1>
  <span class="sub" id="time-now"></span>
</div>

<div class="section-label">대분류</div>

<div class="section-label">진단 선택</div>
<div class="diseases" id="diseases"></div>

<div id="form-area" class="form"></div>

<div class="bottom">
  <button class="btn btn-secondary" onclick="resetAll()">초기화</button>
  <button class="btn btn-primary" onclick="copyText()">복사</button>
</div>

<div class="toast" id="toast">✓ 복사되었습니다</div>

          '심장 질환이나 부정맥 병력이 있는 분',
          '위 증상 중 하나라도 발생 시 즉시 응급실 재내원하시거나 119에 연락하시기 바랍니다.'

// ============================================================
// 상태
// ============================================================
let state = {
  category: null,
  disease: null,
  tests: new Set(),
  decisions: new Set(),
  narrative: '',
  rx: new Set(),
  fu: '',
  warn: new Set(),
  customTests: [],
  customDecisions: [],
  customRx: [],
  customWarn: []
};

// ============================================================
// 렌더링
// ============================================================
function renderCats() {
  const el = document.getElementById('cats');
  el.innerHTML = Object.entries(DATA).map(([key, cat]) =>
    `<button class="cat ${state.category === key ? 'active' : ''}" onclick="selectCat('${key}')">${cat.name}</button>`
  ).join('');
}

function renderDiseases() {
  const el = document.getElementById('diseases');
  if (!state.category) {
    el.innerHTML = '<div class="empty"><div class="e-icon">↑</div>먼저 대분류를 선택하세요</div>';
    return;
  }
  const diseases = DATA[state.category].diseases;
  el.innerHTML = diseases.map(d =>
    `<button class="disease ${state.disease === d.id ? 'active' : ''}" onclick="selectDisease('${d.id}')">
      <div class="dko">${d.ko}</div>
      <div class="den">${d.en.length > 36 ? d.en.slice(0, 34) + '…' : d.en} · ${d.icd}</div>
    </button>`
  ).join('');
}

function renderForm() {
  const el = document.getElementById('form-area');
  if (!state.disease) {
    el.innerHTML = '<div class="empty" style="margin-top:40px;"><div class="e-icon">📋</div>진단을 선택하면<br>퇴원기록지 양식이 나타납니다</div>';
    return;
  }
  const d = DATA[state.category].diseases.find(x => x.id === state.disease);
  el.innerHTML = `
    <div class="dx-card">
      <div class="dx-ko">${d.ko}<span class="dx-icd">${d.icd}</span></div>
      <div class="dx-en">${d.en}</div>
    </div>

    <div class="field">
      <div class="field-label">시행한 검사 <span class="hint">탭하여 선택 (기본 선택됨)</span></div>
      <div class="chips">
        ${d.tests.map(t => `<span class="chip ${state.tests.has(t) ? 'on' : ''}" onclick="toggleSet('tests', this.dataset.v)" data-v="${escAttr(t)}">${t}</span>`).join('')}
        ${state.customTests.map((t, i) => `<span class="chip on" onclick="removeCustom('customTests', ${i})"><span class="x">✕</span>${t}</span>`).join('')}
      </div>
      <div class="add-row">
        <input type="text" placeholder="추가 검사 입력 후 Enter" onkeydown="if(event.key==='Enter') addCustomBtn('customTests', this)">
        <button onclick="addCustomBtn('customTests', this.previousElementSibling)">추가</button>
      </div>
    </div>

    <div class="field">
      <div class="field-label">⚡ 응급실 처치 (결정 사항) <span class="hint">시행한 것만 선택</span></div>
      <div class="chips">
        ${d.decisions.map(t => `<span class="chip tx ${state.decisions.has(t) ? 'on' : ''}" onclick="toggleSet('decisions', this.dataset.v)" data-v="${escAttr(t)}">${t}</span>`).join('')}
        ${state.customDecisions.map((t, i) => `<span class="chip tx on" onclick="removeCustom('customDecisions', ${i})"><span class="x">✕</span>${t}</span>`).join('')}
      </div>
      <div class="add-row">
        <input type="text" placeholder="추가 처치 입력 후 Enter" onkeydown="if(event.key==='Enter') addCustomBtn('customDecisions', this)">
        <button onclick="addCustomBtn('customDecisions', this.previousElementSibling)">추가</button>
      </div>
    </div>

    <div class="field">
      <div class="field-label">📝 진료 경과 / 퇴원 시 상태
        <span class="field-actions"><button class="reset-btn" onclick="resetNarrative()">🔄 템플릿 다시 불러오기</button></span>
      </div>
      <textarea class="narrative" placeholder="진료 경과 요약" oninput="state.narrative=this.value">${state.narrative || d.narrative}</textarea>
    </div>

    <div class="field">
      <div class="field-label">💊 퇴원 처방 (성분명) <span class="hint">필요한 것만 선택</span></div>
      <div class="chips">
        ${d.rx.map(t => `<span class="chip rx ${state.rx.has(t) ? 'on' : ''}" onclick="toggleSet('rx', this.dataset.v)" data-v="${escAttr(t)}">${t}</span>`).join('')}
        ${state.customRx.map((t, i) => `<span class="chip rx on" onclick="removeCustom('customRx', ${i})"><span class="x">✕</span>${t}</span>`).join('')}
      </div>
      <div class="add-row">
        <input type="text" placeholder="추가 처방 입력 후 Enter" onkeydown="if(event.key==='Enter') addCustomBtn('customRx', this)">
        <button onclick="addCustomBtn('customRx', this.previousElementSibling)">추가</button>
      </div>
    </div>

    <div class="field">
      <div class="field-label">📅 추후 진료 계획
        <span class="field-actions"><button class="reset-btn" onclick="resetFu()">🔄 기본값</button></span>
      </div>
      <textarea oninput="state.fu=this.value">${state.fu || d.fu}</textarea>
    </div>

    <div class="field">
      <div class="field-label">⚠️ 재내원 주의사항 <span class="hint">기본 선택됨, 환자 맞춤 수정</span></div>
      <div class="warn-note">의료법적 방어를 위해 가능한 모든 항목을 포함하는 것이 권장됩니다. 환자 상황에 맞춰 조정하세요.</div>
      <div class="chips">
        ${d.warn.map(t => `<span class="chip warn ${state.warn.has(t) ? 'on' : ''}" onclick="toggleSet('warn', this.dataset.v)" data-v="${escAttr(t)}">${t}</span>`).join('')}
        ${state.customWarn.map((t, i) => `<span class="chip warn on" onclick="removeCustom('customWarn', ${i})"><span class="x">✕</span>${t}</span>`).join('')}
      </div>
      <div class="add-row">
        <input type="text" placeholder="추가 주의사항 입력 후 Enter" onkeydown="if(event.key==='Enter') addCustomBtn('customWarn', this)">
        <button onclick="addCustomBtn('customWarn', this.previousElementSibling)">추가</button>
      </div>
    </div>

    <div class="field">
      <div class="field-label">📋 미리보기 <span class="hint">복사 시 이 형식으로</span></div>
      <div class="preview" id="preview">${escHtml(buildText())}</div>
    </div>
  `;
}

// ============================================================
// 이벤트
// ============================================================
function selectCat(key) {
  state.category = key;
  state.disease = null;
  clearForm();
  renderCats();
  renderDiseases();
  renderForm();
}

function selectDisease(id) {
  state.disease = id;
  const d = DATA[state.category].diseases.find(x => x.id === id);
  state.tests = new Set(d.tests);
  state.decisions = new Set();   // 응급실 처치는 의사가 시행한 것만 직접 선택
  state.rx = new Set();          // 처방도 직접 선택
  state.warn = new Set(d.warn);  // 주의사항은 기본 모두 선택 (방어적)
  state.narrative = d.narrative;
  state.fu = d.fu;
  state.customTests = [];
  state.customDecisions = [];
  state.customRx = [];
  state.customWarn = [];
  renderDiseases();
  renderForm();
}

function toggleSet(setName, val) {
  if (state[setName].has(val)) state[setName].delete(val);
  else state[setName].add(val);
  renderForm();
}

function addCustomBtn(listName, inputEl) {
  const v = (inputEl.value || '').trim();
  if (v) {
    state[listName].push(v);
    renderForm();
  }
}

function removeCustom(listName, idx) {
  state[listName].splice(idx, 1);
  renderForm();
}

function resetNarrative() {
  const d = DATA[state.category].diseases.find(x => x.id === state.disease);
  state.narrative = d.narrative;
  renderForm();
}

function resetFu() {
  const d = DATA[state.category].diseases.find(x => x.id === state.disease);
  state.fu = d.fu;
  renderForm();
}

function clearForm() {
  state.tests = new Set();
  state.decisions = new Set();
  state.rx = new Set();
  state.warn = new Set();
  state.narrative = '';
  state.fu = '';
  state.customTests = [];
  state.customDecisions = [];
  state.customRx = [];
  state.customWarn = [];
}

function resetAll() {
  if (!confirm('모든 내용을 초기화하시겠습니까?')) return;
  state.category = null;
  state.disease = null;
  clearForm();
  renderCats();
  renderDiseases();
  renderForm();
}

// ============================================================
// 텍스트 생성
// ============================================================
function buildText() {
  if (!state.disease) return '';
  const d = DATA[state.category].diseases.find(x => x.id === state.disease);
  const lines = [];

  lines.push('[퇴원진단]');
  lines.push(`- ${d.ko} (${d.en}, ${d.icd})`);
  lines.push('');

  const allTests = [...state.tests, ...state.customTests];
  if (allTests.length) {
    lines.push('[시행한 검사]');
    allTests.forEach(t => lines.push(`- ${t}`));
    lines.push('');
  }

  const allDecisions = [...state.decisions, ...state.customDecisions];
  if (allDecisions.length) {
    lines.push('[응급실 처치]');
    allDecisions.forEach(t => lines.push(`- ${t}`));
    lines.push('');
  }

  const narr = (state.narrative || d.narrative).trim();
  if (narr) {
    lines.push('[진료 경과 및 퇴원 시 상태]');
    lines.push(narr);
    lines.push('');
  }

  const allRx = [...state.rx, ...state.customRx];
  if (allRx.length) {
    lines.push('[퇴원 처방]');
    allRx.forEach((r, i) => lines.push(`${i + 1}. ${r}`));
    lines.push('');
  }

  const fuText = (state.fu || d.fu).trim();
  if (fuText) {
    lines.push('[추후 진료 계획]');
    lines.push(fuText);
    lines.push('');
  }

  const allWarn = [...state.warn, ...state.customWarn];
  if (allWarn.length) {
    lines.push('[재내원 주의사항]');
    lines.push('아래와 같은 증상이 발생할 경우 즉시 응급실로 재내원하시거나 119에 연락하시기 바랍니다.');
    allWarn.forEach(w => lines.push(`- ${w}`));
    lines.push('');
    lines.push('※ 본 안내사항은 진료 시점의 평가에 따른 것이며, 증상의 변화나 새로운 증상 발생 시 언제든지 의료기관 방문이 필요합니다.');
  }

  return lines.join('\n');
}

// ============================================================
// 복사
// ============================================================
function copyText() {
  const text = buildText();
  if (!text) {
    showToast('진단을 먼저 선택하세요', true);
    return;
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('✓ 복사되었습니다'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ 복사되었습니다');
  }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  if (isError) {
    t.style.background = 'var(--red)';
    t.style.color = '#fff';
    t.style.boxShadow = '0 8px 24px rgba(255, 77, 106, 0.3)';
  } else {
    t.style.background = 'var(--green)';
    t.style.color = '#042918';
    t.style.boxShadow = '0 8px 24px rgba(0, 217, 126, 0.3)';
  }
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ============================================================
// 유틸
// ============================================================
function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function updateTime() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('time-now').textContent =
    `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

// ============================================================
// 초기화
// ============================================================
renderCats();
renderDiseases();
renderForm();
updateTime();
setInterval(updateTime, 30000);
</script>
