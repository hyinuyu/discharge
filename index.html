<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

  :root {
    --bg: #1a1525;
    --bg2: #221d2e;
    --bg3: #2a2438;
    --card: #2a2438;
    --card-hover: #332b48;
    --border: #3a3151;
    --border2: #483e64;
    --accent: #ff8db5;
    --accent2: #e879a6;
    --accent-soft: rgba(255, 141, 181, 0.14);
    --mint: #7ee8c9;
    --mint-soft: rgba(126, 232, 201, 0.14);
    --yellow: #ffd680;
    --yellow-soft: rgba(255, 214, 128, 0.14);
    --purple: #c8a5ff;
    --purple-soft: rgba(200, 165, 255, 0.14);
    --red: #ff7e8a;
    --text: #f8f1fa;
    --text2: #d4c8e0;
    --text3: #a094b8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; }
  body {
    padding: 14px 14px 110px;
    padding-top: max(14px, env(safe-area-inset-top));
    padding-bottom: max(110px, calc(110px + env(safe-area-inset-bottom)));
    max-width: 760px;
    margin: 0 auto;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at top, rgba(255, 141, 181, 0.08), transparent 60%);
  }

  /* 헤더 */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 4px 4px 14px; gap: 8px; flex-wrap: wrap; }
  .header h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 6px; letter-spacing: -0.02em; }
  .header h1 .ver { color: var(--text3); font-weight: 400; font-size: 11px; font-family: var(--mono); }
  .header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .pill-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 999px; border: 0.5px solid; font-size: 11px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); font-family: var(--sans); }
  .pill-btn .txt { font-family: var(--mono); letter-spacing: -0.02em; }
  .pill-btn:active { transform: scale(0.95); }
  .share-btn { background: linear-gradient(135deg, var(--purple-soft), var(--mint-soft)); border-color: var(--purple); color: var(--purple); }
  .share-btn:hover { background: var(--purple); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(200, 165, 255, 0.35); }
  .blog-btn { background: linear-gradient(135deg, var(--accent-soft), var(--purple-soft)); border-color: var(--accent); color: var(--accent); }
  .blog-btn:hover { background: var(--accent); color: #fff; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255, 141, 181, 0.35); }
  .sub { font-size: 10.5px; color: var(--text3); font-family: var(--mono); }

  /* 라벨 */
  .section-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; margin: 14px 4px 8px; font-weight: 600; }

  /* 카테고리 (둥글둥글) */
  .cats { display: flex; flex-wrap: wrap; gap: 6px; padding: 2px 0; }
  .cat { padding: 9px 14px; border-radius: 999px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap; font-weight: 500; }
  .cat:hover { background: var(--card); color: var(--text); }
  .cat:active { transform: scale(0.96); }
  .cat.active { color: #fff; font-weight: 600; box-shadow: 0 4px 14px rgba(0,0,0,0.2); transform: translateY(-1px); }
  .cat.active.c-resp { background: linear-gradient(135deg, #7ee8c9, #5fd4b0); border-color: #7ee8c9; }
  .cat.active.c-gi { background: linear-gradient(135deg, #ffb088, #ff9670); border-color: #ffb088; }
  .cat.active.c-trauma { background: linear-gradient(135deg, #ff8db5, #e879a6); border-color: #ff8db5; }
  .cat.active.c-neuro { background: linear-gradient(135deg, #c8a5ff, #b088f0); border-color: #c8a5ff; }
  .cat.active.c-msk { background: linear-gradient(135deg, #ffd680, #ffc24d); border-color: #ffd680; }
  .cat.active.c-gu { background: linear-gradient(135deg, #88c8ff, #6db4f5); border-color: #88c8ff; }
  .cat.active.c-skin { background: linear-gradient(135deg, #88e8b0, #6fd498); border-color: #88e8b0; }
  .cat.active.c-cv { background: linear-gradient(135deg, #ff8aaa, #f06b91); border-color: #ff8aaa; }

  /* 질환 카드 */
  .diseases { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .disease { padding: 12px; background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; cursor: pointer; transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); text-align: left; }
  .disease:hover { background: var(--card-hover); transform: translateY(-2px); }
  .disease:active { transform: scale(0.97); }
  .disease.active { background: var(--accent-soft); border-color: var(--accent); box-shadow: 0 4px 20px rgba(255, 141, 181, 0.15); }
  .disease.active .dko { color: var(--accent); }
  .disease .dko { font-size: 13.5px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
  .disease .den { font-size: 9.5px; color: var(--text3); font-family: var(--mono); line-height: 1.3; }

  /* 빈 상태 - 가시성 강화 */
  .empty { padding: 50px 20px; text-align: center; color: var(--text2); font-size: 14px; grid-column: 1 / -1; line-height: 1.6; }
  .empty .e-icon { font-size: 36px; margin-bottom: 14px; opacity: 0.85; }
  .empty b { color: var(--accent); font-weight: 600; }

  /* 진단 카드 */
  .dx-card { background: linear-gradient(135deg, var(--accent-soft), transparent), var(--card); border: 0.5px solid var(--accent); border-radius: 16px; padding: 14px 16px; margin: 16px 0; box-shadow: 0 4px 20px rgba(255, 141, 181, 0.08); }
  .dx-card .dx-ko { font-size: 17px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
  .dx-card .dx-en { font-size: 11.5px; color: var(--text2); font-family: var(--mono); }
  .dx-card .dx-icd { display: inline-block; font-size: 10px; background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 999px; margin-left: 6px; font-family: var(--mono); font-weight: 600; vertical-align: middle; }

  /* 3섹션 카드 */
  .section { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 16px; margin-bottom: 14px; overflow: hidden; transition: border-color 0.15s; }
  .section:hover { border-color: var(--border2); }
  .section.s-tx { box-shadow: 0 4px 20px rgba(255, 141, 181, 0.06); }
  .section.s-fu { box-shadow: 0 4px 20px rgba(126, 232, 201, 0.06); }
  .section.s-st { box-shadow: 0 4px 20px rgba(255, 214, 128, 0.06); }
  .section-head { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; gap: 10px; }
  .section.s-tx .section-head { background: linear-gradient(90deg, var(--accent-soft), transparent); }
  .section.s-fu .section-head { background: linear-gradient(90deg, var(--mint-soft), transparent); }
  .section.s-st .section-head { background: linear-gradient(90deg, var(--yellow-soft), transparent); }
  .section-title { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .section.s-tx .section-title { color: var(--accent); }
  .section.s-fu .section-title { color: var(--mint); }
  .section.s-st .section-title { color: var(--yellow); }
  .copy-btn { padding: 6px 12px; border-radius: 999px; border: 0.5px solid; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); font-family: var(--sans); background: transparent; }
  .copy-btn:active { transform: scale(0.94); }
  .section.s-tx .copy-btn { border-color: var(--accent); color: var(--accent); }
  .section.s-tx .copy-btn:hover { background: var(--accent); color: #fff; }
  .section.s-fu .copy-btn { border-color: var(--mint); color: var(--mint); }
  .section.s-fu .copy-btn:hover { background: var(--mint); color: #0d3528; }
  .section.s-st .copy-btn { border-color: var(--yellow); color: var(--yellow); }
  .section.s-st .copy-btn:hover { background: var(--yellow); color: #3d2e0a; }

  textarea { width: 100%; background: transparent; border: none; padding: 12px 16px; font-size: 13.5px; color: var(--text); font-family: var(--sans); resize: vertical; line-height: 1.7; min-height: 100px; }
  textarea:focus { outline: none; background: var(--bg3); }
  .section.s-tx textarea { min-height: 160px; }
  .section.s-st textarea { min-height: 90px; }

  /* 하단 버튼 */
  .bottom { position: fixed; bottom: 0; left: 0; right: 0; padding: 10px 14px 14px; padding-bottom: max(14px, env(safe-area-inset-bottom)); background: linear-gradient(to top, var(--bg) 65%, rgba(26, 21, 37, 0.85) 85%, transparent); display: flex; gap: 8px; max-width: 760px; margin: 0 auto; z-index: 10; backdrop-filter: blur(8px); }
  .btn { flex: 1; padding: 15px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: var(--sans); transition: all 0.18s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 16px rgba(255, 141, 181, 0.35); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(255, 141, 181, 0.45); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary { flex: 0 0 100px; background: var(--card); color: var(--text2); border: 0.5px solid var(--border); }
  .btn-secondary:hover { color: var(--text); background: var(--card-hover); }
  .btn-secondary:active { transform: scale(0.97); }

  /* 토스트 */
  .toast { position: fixed; top: max(16px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%); padding: 11px 20px; border-radius: 999px; font-size: 13px; font-weight: 700; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s; background: linear-gradient(135deg, var(--mint), #5fd4b0); color: #0d3528; box-shadow: 0 8px 24px rgba(126, 232, 201, 0.35); }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }
</style>
</head>

// 짧은 narrative: 진단별 핵심 + 공통 결론
function simplifyNarrative(d) {
  const brief = BRIEF[d.id] || '진찰 및 검사상 응급 질환 시사 소견 없음.';
  return brief + ' 응급실 처치 후 증상 호전되어 활력징후 안정 확인 후 귀가 조치함.';
}

// 치료과정: 검사 + 처치 + 진료경과 + 처방
function buildTreatment(d) {
  const tests = [...new Set(d.tests.map(t => t.split(':')[0].trim()))].join(', ');
  // 처치 항목 끝에 이미 "시행"이 붙어있는 경우 제거 (중복 방지)
  const decisions = [...new Set(d.decisions)].slice(0, 4)
    .map(s => s.replace(/\s*시행\s*$/, '').trim())
    .join(', ');
  const narrative = simplifyNarrative(d);
  return [
    '▷ 시행한 검사',
    tests + ' — 진단 합당 소견 외 특이 이상 없음.',
    '',
    '▷ 응급실 처치',
    decisions + ' 시행.',
    '',
    '▷ 진료 경과',
    narrative
  ].join('\n');
}

// 추후계획: 추후 진료 + 재내원 주의사항
function buildFollowup(d) {
  const warns = d.warn.map(w => '- ' + w).join('\n');
  return [
    '▷ 추후 진료 계획',
    d.fu,
    '',
    '▷ 재내원 주의사항 (환자/보호자 교육)',
    warns
  ].join('\n');
}

// 퇴원 시 환자상태 (카테고리별 적절한 항목)
function buildStatus(catKey) {
  const common = [
    '활력징후 안정',
    '의식 명료',
    '통증 호전',
    '자가 보행 가능'
  ];
  const byCategory = {
    resp: ['호흡곤란 없음'],
    gi: ['경구 식이 가능'],
    trauma: ['신경학적 평가 정상'],
    neuro: ['신경학적 진찰 정상'],
    msk: ['신경학적 평가 정상'],
    gu: ['배뇨 가능'],
    skin: ['혈관부종 없음'],
    cv: ['ECG 정상']
  };
  const items = common.concat(byCategory[catKey] || []);
  return items.map(s => '- ' + s).join('\n');
}

function renderCats() {
  document.getElementById('cats').innerHTML = Object.entries(DATA).map(function(entry) {

    return '<button class="cat c-' + key + ' ' + (state.category === key ? 'active' : '') + '" onclick="selectCat(\'' + key + '\')">' + cat.name + '</button>';
  }).join('');

  const el = document.getElementById('diseases');

    el.innerHTML = '<div class="empty"><div class="e-icon">👆</div>먼저 <b>대분류</b>를 선택해주세요</div>';

    return '<button class="disease ' + (state.disease === d.id ? 'active' : '') + '" onclick="selectDisease(\'' + d.id + '\')">' +

function selectCat(key) {
  state.category = key;
  state.disease = null;
  state.treatment = '';
  state.followup = '';
  state.status = '';
  renderCats();
  renderDiseases();
  renderForm();
}

function selectDisease(id) {
  state.disease = id;
  const d = DATA[state.category].diseases.find(function(x) { return x.id === id; });
  // 3섹션 자동 채움
  state.treatment = buildTreatment(d);
  state.followup = buildFollowup(d);
  state.status = buildStatus(state.category);
  renderDiseases();
  renderForm();
}

function resetAll() {
  if (!confirm('모든 내용을 초기화하시겠습니까?')) return;
  state.category = null;
  state.disease = null;
  state.treatment = '';
  state.followup = '';
  state.status = '';
  renderCats();
  renderDiseases();
  renderForm();
}

function copySection(which) {
  const text = state[which];
  if (!text || !text.trim()) {
    showToast('내용이 없습니다', true);
    return;
  }
  const labels = { treatment: '치료과정', followup: '추후계획', status: '퇴원 시 환자상태' };
  copyToClipboard(text, '✓ ' + labels[which] + ' 복사 완료');
}

function copyAll() {
  if (!state.disease) {
    showToast('진단을 먼저 선택하세요', true);
    return;
  }
  const d = DATA[state.category].diseases.find(function(x) { return x.id === state.disease; });
  const text = [
    '[퇴원진단] ' + d.ko + ' (' + d.en + ', ' + d.icd + ')',
    '',
    '■ 치료과정',
    state.treatment,
    '',
    '■ 추후계획',
    state.followup,
    '',
    '■ 퇴원 시 환자상태',
    state.status
  ].join('\n');
  copyToClipboard(text, '✓ 전체 복사 완료');
}

function copyToClipboard(text, msg) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showToast(msg); });
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast(msg);
}

// ──────────────────────────────────────────────
// 공유
// ──────────────────────────────────────────────
async function shareApp() {
  const url = window.location.href;
  const data = { title: '퇴원기록지 도우미', text: '응급실 퇴원기록지 빠른 작성 도구 🩺💗', url: url };
  if (navigator.share) {
    try { await navigator.share(data); return; } catch (e) {
      if (e.name === 'AbortError') return;
    }
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    try { await navigator.clipboard.writeText(url); showToast('🔗 링크가 복사되었어요!'); return; } catch (e) {}
  }
  const ta = document.createElement('textarea');
  ta.value = url;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('🔗 링크가 복사되었어요!');
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  if (isError) {
    t.style.background = 'linear-gradient(135deg, var(--red), #e26475)';
    t.style.color = '#fff';
    t.style.boxShadow = '0 8px 24px rgba(255, 126, 138, 0.35)';
  } else {
    t.style.background = 'linear-gradient(135deg, var(--mint), #5fd4b0)';
    t.style.color = '#0d3528';
    t.style.boxShadow = '0 8px 24px rgba(126, 232, 201, 0.35)';
  }
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function updateTime() {
  const now = new Date();
  const p = function(n) { return String(n).padStart(2, '0'); };
  document.getElementById('time-now').textContent = now.getFullYear() + '-' + p(now.getMonth() + 1) + '-' + p(now.getDate()) + ' ' + p(now.getHours()) + ':' + p(now.getMinutes());
}
