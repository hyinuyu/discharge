<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb3d1"/>
      <stop offset="50%" stop-color="#ff8db5"/>
      <stop offset="100%" stop-color="#e879a6"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff5fa"/>
    </linearGradient>
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff8db5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff8db5" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- 둥근 핑크 배경 -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 데코 하트들 (배경) -->
  <g opacity="0.18" fill="#ffffff">
    <path d="M 80 110 c -8 -10 4 -22 14 -14 c 10 -8 22 4 14 14 l -14 16 z" transform="scale(1.4)"/>
    <path d="M 330 75 c -8 -10 4 -22 14 -14 c 10 -8 22 4 14 14 l -14 16 z" transform="scale(1.2)"/>
    <path d="M 60 380 c -8 -10 4 -22 14 -14 c 10 -8 22 4 14 14 l -14 16 z" transform="scale(1.1)"/>
  </g>

  <!-- 종이 카드 (퇴원기록지 느낌) -->
  <g transform="translate(126, 130)">
    <!-- 종이 그림자 -->
    <rect x="6" y="10" width="260" height="270" rx="28" fill="#000" opacity="0.10"/>
    <!-- 종이 본체 -->
    <rect width="260" height="270" rx="28" fill="url(#paper)" stroke="#ffe4ee" stroke-width="2"/>

    <!-- 종이 위쪽 라인 (제목 느낌) -->
    <rect x="32" y="38" width="120" height="10" rx="5" fill="#ffc4d9"/>
    <rect x="32" y="58" width="80" height="6" rx="3" fill="#ffd9e5"/>

    <!-- 청진기 -->
    <g transform="translate(34, 92)">
      <!-- 청진기 줄 -->
      <path d="M 30 0 Q 30 50 70 75 Q 110 100 110 130"
            fill="none" stroke="#5b3a4f" stroke-width="6" stroke-linecap="round"/>
      <path d="M 90 0 Q 90 50 110 75 Q 130 100 130 130"
            fill="none" stroke="#5b3a4f" stroke-width="6" stroke-linecap="round"/>
      <!-- 이어팁 -->
      <circle cx="30" cy="0" r="9" fill="#5b3a4f"/>
      <circle cx="90" cy="0" r="9" fill="#5b3a4f"/>
      <!-- Y자 합치는 부분 -->
      <circle cx="110" cy="130" r="8" fill="#5b3a4f"/>
      <!-- 청진기 헤드 (다이아프램) -->
      <circle cx="160" cy="148" r="34" fill="#ff8db5" stroke="#5b3a4f" stroke-width="5"/>
      <circle cx="160" cy="148" r="22" fill="#ffffff" opacity="0.4"/>
      <!-- 헤드와 줄 연결 -->
      <line x1="110" y1="130" x2="140" y2="142" stroke="#5b3a4f" stroke-width="6" stroke-linecap="round"/>

      <!-- 청진기 헤드의 귀여운 얼굴 -->
      <circle cx="151" cy="145" r="3.5" fill="#5b3a4f"/>
      <circle cx="169" cy="145" r="3.5" fill="#5b3a4f"/>
      <path d="M 152 156 Q 160 162 168 156" fill="none" stroke="#5b3a4f" stroke-width="2.5" stroke-linecap="round"/>
      <!-- 볼터치 -->
      <ellipse cx="143" cy="153" rx="5" ry="3" fill="url(#cheek)"/>
      <ellipse cx="177" cy="153" rx="5" ry="3" fill="url(#cheek)"/>
    </g>
  </g>

  <!-- 큰 하트 (오른쪽 상단) -->
  <g transform="translate(380, 90)">
    <path d="M 0 18 C -16 -2 16 -22 32 -2 C 48 -22 80 -2 64 18 L 32 50 Z"
          fill="#ffffff" opacity="0.95"/>
    <path d="M 0 18 C -16 -2 16 -22 32 -2 C 48 -22 80 -2 64 18 L 32 50 Z"
          fill="none" stroke="#e879a6" stroke-width="2"/>
    <!-- 하트 안 작은 +기호 -->
    <rect x="26" y="8" width="12" height="3" rx="1.5" fill="#e879a6"/>
    <rect x="30.5" y="3.5" width="3" height="12" rx="1.5" fill="#e879a6"/>
  </g>

  <!-- 반짝이 ✨ -->
  <g fill="#ffffff">
    <circle cx="100" cy="220" r="4"/>
    <circle cx="430" cy="380" r="5"/>
    <circle cx="450" cy="200" r="3"/>
    <circle cx="80" cy="450" r="3.5"/>
  </g>
</svg>
